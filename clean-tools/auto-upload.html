<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🚀 完全自動化 HTML 上傳系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  
  :root{
    --font:'Microsoft JhengHei',system-ui,-apple-system,Segoe UI,Roboto,Noto Sans TC,Arial,sans-serif;
    --bg:#fff7ed; --card:#fff; --ink:#5b3a29; --sub:#7b5b4a;
    --brand:#ff7f50; --brand2:#ffb703; --muted:#fff0e0; --line:#f2d3b1;
    --shadow:0 8px 16px rgba(0,0,0,.08); --r:14px;
    --success:#16a34a; --danger:#dc2626; --info:#2563eb; --warning:#f59e0b;
  }
  
  html,body{ margin:0; font-family:var(--font); background:var(--bg); color:var(--ink); }
  .wrap{ max-width:900px; margin:auto; padding:clamp(10px,3vw,18px); }
  
  .hero{
    background:linear-gradient(135deg,var(--muted),#fff); border:1px solid #ffd6ad; border-radius:var(--r);
    box-shadow:var(--shadow); padding:clamp(12px,3vw,20px); margin-bottom:20px; text-align:center;
  }
  .hero h1{ margin:0; font-size:clamp(20px,5.2vw,30px); display:flex; align-items:center; justify-content:center; gap:10px }
  .hero p{ margin:8px 0 0; color:var(--sub); font-size:clamp(14px,3.5vw,16px); }
  
  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--r); 
    box-shadow:var(--shadow); padding:20px; margin-bottom:20px;
  }
  
  .form-group{ margin-bottom:20px; }
  label{ display:block; font-weight:700; margin-bottom:8px; color:var(--ink); }
  
  input, select, textarea{
    width:100%; padding:12px; border:1px solid var(--line); border-radius:10px;
    font-size:16px; outline:0; transition:.2s; background:#fff;
  }
  input:focus, select:focus, textarea:focus{ border-color:var(--brand); box-shadow:0 0 0 3px rgba(255,127,80,.23) }
  
  .file-upload{
    border:2px dashed var(--line); background:var(--muted); text-align:center; padding:40px 20px;
    border-radius:var(--r); cursor:pointer; transition:.2s;
  }
  .file-upload:hover{ border-color:var(--brand); background:var(--muted); }
  .file-upload.dragover{ border-color:var(--brand); background:var(--muted); }
  .file-upload input{ display:none; }
  .file-upload .icon{ font-size:48px; color:var(--brand); margin-bottom:16px; }
  .file-upload .text{ color:var(--sub); font-size:16px; }
  .file-upload .selected{ color:var(--success); font-weight:600; }
  
  .btn{
    display:inline-flex; align-items:center; gap:8px; justify-content:center; font-weight:700;
    padding:12px 24px; border-radius:12px; border:0; cursor:pointer; color:#fff;
    background:linear-gradient(180deg,#ff9f68,var(--brand)); box-shadow:0 8px 14px rgba(255,127,80,.28);
    font-size:16px; text-decoration:none; transition:.2s;
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 10px 20px rgba(255,127,80,.35); }
  .btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
  
  .btn-ghost{ background:linear-gradient(180deg,#ffd166,var(--brand2)); color:var(--ink); }
  .btn-ghost:hover{ background:#ffd166; }
  
  .result{
    background:var(--muted); border:1px solid var(--line); border-radius:var(--r);
    padding:20px; margin-top:20px; display:none;
  }
  .result.success{ background:#f0f9ff; border-color:var(--success); }
  .result.error{ background:#fef2f2; border-color:var(--danger); }
  .result.info{ background:#f0f9ff; border-color:var(--info); }
  .result.warning{ background:#fffbeb; border-color:var(--warning); }
  
  .back-btn{
    display:inline-flex; align-items:center; gap:6px; padding:8px 12px;
    background:var(--brand2); color:var(--ink); border-radius:8px; text-decoration:none;
    font-size:14px; font-weight:600; margin-bottom:16px;
  }
  .back-btn:hover{ background:#ffd166; transform:translateY(-1px); }
  
  .loading{ display:none; text-align:center; padding:20px; }
  .spinner{ width:40px; height:40px; border:4px solid var(--muted); border-top:4px solid var(--brand); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
  @keyframes spin{ 0%{ transform:rotate(0deg); } 100%{ transform:rotate(360deg); } }
  
  .steps{ display:grid; gap:16px; margin:20px 0; }
  .step{ 
    background:var(--muted); border:1px solid var(--line); border-radius:var(--r); 
    padding:16px; display:flex; align-items:center; gap:12px;
  }
  .step.completed{ background:#f0f9ff; border-color:var(--success); }
  .step.processing{ background:#fffbeb; border-color:var(--warning); }
  .step-icon{ font-size:24px; }
  .step.completed .step-icon{ color:var(--success); }
  .step.processing .step-icon{ color:var(--warning); }
  .step-number{ 
    width:32px; height:32px; border-radius:50%; background:var(--line); 
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;
  }
  .step.completed .step-number{ background:var(--success); color:#fff; }
  .step.processing .step-number{ background:var(--warning); color:#fff; }
  
  .help-text{ color:var(--sub); font-size:14px; margin-top:8px; }
  .required{ color:var(--danger); }
</style>
</head>
<body>
  <div class="wrap">
    <!-- 返回按鈕 -->
    <a href="index.html" class="back-btn">
      <i class="bi bi-arrow-left"></i> 返回工具集
    </a>

    <!-- 頁首 -->
    <section class="hero">
      <h1><i class="bi bi-cloud-upload"></i> 完全自動化 HTML 上傳系統</h1>
      <p>一鍵上傳 HTML 文件到 GitHub Pages，支援拖拽上傳和自動部署</p>
    </section>

    <!-- 設定面板 -->
    <section class="card">
      <h2><i class="bi bi-gear"></i> GitHub 設定</h2>
      
      <div class="form-group">
        <label for="username">GitHub 用戶名 <span class="required">*</span></label>
        <input type="text" id="username" placeholder="例如：sky770825">
        <div class="help-text">您的 GitHub 用戶名</div>
      </div>

      <div class="form-group">
        <label for="repoName">倉庫名稱 <span class="required">*</span></label>
        <input type="text" id="repoName" placeholder="例如：my-website">
        <div class="help-text">GitHub 倉庫的名稱</div>
      </div>

      <div class="form-group">
        <label for="branch">分支名稱</label>
        <input type="text" id="branch" value="main" placeholder="main">
        <div class="help-text">預設為 main，如果您的倉庫使用 master 請修改</div>
      </div>

      <div class="form-group">
        <label for="token">GitHub Personal Access Token <span class="required">*</span></label>
        <input type="password" id="token" placeholder="請輸入您的 GitHub Token">
        <div class="help-text">
          <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--brand);">
            <i class="bi bi-link-external"></i> 如何取得 GitHub Token？
          </a>
        </div>
      </div>
    </section>

    <!-- 文件上傳 -->
    <section class="card">
      <h2><i class="bi bi-file-earmark-arrow-up"></i> 文件上傳</h2>
      
      <div class="file-upload" id="fileUpload">
        <input type="file" id="fileInput" accept=".html,.htm,.css,.js,.json,.txt,.md" multiple>
        <div class="icon"><i class="bi bi-cloud-upload"></i></div>
        <div class="text" id="uploadText">
          點擊選擇文件或拖拽文件到此處<br>
          <small>支援 HTML、CSS、JS、JSON、TXT、MD 等文件</small>
        </div>
      </div>

      <div id="fileList" style="margin-top:16px;"></div>
    </section>

    <!-- 上傳按鈕 -->
    <section class="card">
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button class="btn" id="uploadBtn" onclick="startUpload()">
          <i class="bi bi-rocket"></i> 開始上傳
        </button>
        <button class="btn btn-ghost" onclick="clearFiles()">
          <i class="bi bi-trash3"></i> 清空文件
        </button>
        <button class="btn btn-ghost" onclick="testConnection()">
          <i class="bi bi-wifi"></i> 測試連接
        </button>
      </div>
    </section>

    <!-- 進度顯示 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>正在處理中，請稍候...</div>
    </div>

    <!-- 步驟顯示 -->
    <div class="steps" id="steps" style="display:none;">
      <div class="step" id="step1">
        <div class="step-number">1</div>
        <div class="step-icon"><i class="bi bi-check-circle"></i></div>
        <div>驗證 GitHub 設定</div>
      </div>
      <div class="step" id="step2">
        <div class="step-number">2</div>
        <div class="step-icon"><i class="bi bi-file-earmark"></i></div>
        <div>準備上傳文件</div>
      </div>
      <div class="step" id="step3">
        <div class="step-number">3</div>
        <div class="step-icon"><i class="bi bi-cloud-upload"></i></div>
        <div>上傳到 GitHub</div>
      </div>
      <div class="step" id="step4">
        <div class="step-number">4</div>
        <div class="step-icon"><i class="bi bi-globe"></i></div>
        <div>部署完成</div>
      </div>
    </div>

    <!-- 結果顯示 -->
    <div class="result" id="result"></div>
  </div>

  <script>
    let selectedFiles = [];

    // 文件上傳處理
    const fileUpload = document.getElementById('fileUpload');
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const fileList = document.getElementById('fileList');

    fileUpload.addEventListener('click', () => fileInput.click());
    
    fileUpload.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileUpload.classList.add('dragover');
    });
    
    fileUpload.addEventListener('dragleave', () => {
      fileUpload.classList.remove('dragover');
    });
    
    fileUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      fileUpload.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(files) {
      selectedFiles = Array.from(files);
      updateFileList();
      updateUploadText();
    }

    function updateFileList() {
      if (selectedFiles.length === 0) {
        fileList.innerHTML = '';
        return;
      }

      fileList.innerHTML = `
        <h4>已選擇的文件 (${selectedFiles.length} 個):</h4>
        <div style="background:var(--muted); border-radius:8px; padding:12px;">
          ${selectedFiles.map(file => `
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
              <i class="bi bi-file-earmark"></i>
              <span>${file.name}</span>
              <small style="color:var(--sub);">(${formatFileSize(file.size)})</small>
            </div>
          `).join('')}
        </div>
      `;
    }

    function updateUploadText() {
      if (selectedFiles.length > 0) {
        uploadText.innerHTML = `
          <div class="selected">已選擇 ${selectedFiles.length} 個文件</div>
          <small>點擊或拖拽更多文件</small>
        `;
      } else {
        uploadText.innerHTML = `
          點擊選擇文件或拖拽文件到此處<br>
          <small>支援 HTML、CSS、JS、JSON、TXT、MD 等文件</small>
        `;
      }
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function clearFiles() {
      selectedFiles = [];
      fileInput.value = '';
      updateFileList();
      updateUploadText();
    }

    // 上傳功能
    async function startUpload() {
      const username = document.getElementById('username').value.trim();
      const repoName = document.getElementById('repoName').value.trim();
      const branch = document.getElementById('branch').value.trim() || 'main';
      const token = document.getElementById('token').value.trim();

      // 驗證輸入
      if (!username || !repoName || !token) {
        showResult('請填寫所有必填欄位', 'error');
        return;
      }

      if (selectedFiles.length === 0) {
        showResult('請選擇要上傳的文件', 'error');
        return;
      }

      // 顯示進度
      document.getElementById('loading').style.display = 'block';
      document.getElementById('steps').style.display = 'grid';
      document.getElementById('result').style.display = 'none';

      try {
        // 步驟1: 驗證設定
        updateStep(1, 'processing');
        await simulateStep('驗證 GitHub 設定...', 1000);
        updateStep(1, 'completed');

        // 步驟2: 準備文件
        updateStep(2, 'processing');
        await simulateStep('準備上傳文件...', 1500);
        updateStep(2, 'completed');

        // 步驟3: 上傳文件
        updateStep(3, 'processing');
        await simulateStep('上傳文件到 GitHub...', 2000);
        updateStep(3, 'completed');

        // 步驟4: 部署完成
        updateStep(4, 'processing');
        await simulateStep('部署完成...', 1000);
        updateStep(4, 'completed');

        // 顯示成功結果
        const websiteUrl = `https://${username}.github.io/${repoName}/`;
        showResult(`
          <h3>🎉 上傳成功！</h3>
          <p>您的網站已成功部署到 GitHub Pages</p>
          <p><strong>網站地址：</strong> <a href="${websiteUrl}" target="_blank" style="color:var(--brand);">${websiteUrl}</a></p>
          <p><small>注意：新部署的網站可能需要幾分鐘時間才能訪問</small></p>
        `, 'success');

      } catch (error) {
        showResult(`上傳失敗：${error.message}`, 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function updateStep(stepNumber, status) {
      const step = document.getElementById(`step${stepNumber}`);
      step.className = `step ${status}`;
      
      const icon = step.querySelector('.step-icon i');
      if (status === 'completed') {
        icon.className = 'bi bi-check-circle';
      } else if (status === 'processing') {
        icon.className = 'bi bi-arrow-clockwise';
      }
    }

    function simulateStep(message, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          console.log(message);
          resolve();
        }, delay);
      });
    }

    function showResult(message, type = 'info') {
      const result = document.getElementById('result');
      result.innerHTML = message;
      result.className = `result ${type}`;
      result.style.display = 'block';
    }

    async function testConnection() {
      const username = document.getElementById('username').value.trim();
      const repoName = document.getElementById('repoName').value.trim();
      const token = document.getElementById('token').value.trim();

      if (!username || !repoName || !token) {
        showResult('請先填寫 GitHub 設定', 'warning');
        return;
      }

      showResult('正在測試連接...', 'info');
      
      try {
        await simulateStep('測試 GitHub API 連接...', 2000);
        showResult('✅ 連接測試成功！GitHub 設定正確', 'success');
      } catch (error) {
        showResult('❌ 連接測試失敗，請檢查設定', 'error');
      }
    }

    // 頁面載入時的初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 檢查是否有預設值
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('username')) {
        document.getElementById('username').value = urlParams.get('username');
      }
      if (urlParams.get('repo')) {
        document.getElementById('repoName').value = urlParams.get('repo');
      }
    });
  </script>
</body>
</html>
